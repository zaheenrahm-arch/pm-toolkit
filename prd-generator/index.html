<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PRD Generator — AI Product Specs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0f0e0d;
    --paper: #f5f2ec;
    --cream: #ede9e0;
    --rule: #d4cfc4;
    --accent: #c8451a;
    --accent-light: #f5e8e3;
    --muted: #7a7368;
    --mono: 'DM Mono', monospace;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'Instrument Sans', sans-serif;
  }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    border-bottom: 1.5px solid var(--ink);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    font-family: var(--serif);
    font-size: 1.3rem;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .logo span { color: var(--accent); }
  .tagline {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
    border-left: 1.5px solid var(--rule);
    padding-left: 1rem;
  }

  /* LAYOUT */
  main {
    display: grid;
    grid-template-columns: 360px 1fr;
    min-height: calc(100vh - 58px);
  }

  /* INPUT PANEL */
  .panel-input {
    border-right: 1.5px solid var(--ink);
    padding: 2rem;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .panel-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  .field-group { display: flex; flex-direction: column; gap: 0.35rem; }

  input[type="text"], textarea, select {
    background: var(--paper);
    border: 1.5px solid var(--rule);
    border-radius: 4px;
    padding: 0.65rem 0.85rem;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--ink);
    width: 100%;
    transition: border-color 0.15s;
    outline: none;
    resize: vertical;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    border-color: var(--accent);
  }
  textarea { min-height: 90px; }

  .btn-generate {
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 4px;
    padding: 0.85rem 1.5rem;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.04em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    transition: background 0.15s, transform 0.1s;
    margin-top: auto;
  }
  .btn-generate:hover { background: var(--accent); }
  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled { background: var(--rule); cursor: not-allowed; }

  .dot-loader {
    display: none;
    gap: 4px;
    align-items: center;
  }
  .dot-loader span {
    width: 6px; height: 6px;
    background: var(--paper);
    border-radius: 50%;
    animation: pulse 1s ease-in-out infinite;
  }
  .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
  .dot-loader span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,100%{opacity:0.3;} 50%{opacity:1;} }

  /* OUTPUT PANEL */
  .panel-output {
    padding: 2.5rem 2.5rem 3rem;
    overflow-y: auto;
  }

  .output-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    color: var(--muted);
    gap: 1rem;
  }
  .output-empty .big-char {
    font-family: var(--serif);
    font-size: 5rem;
    line-height: 1;
    color: var(--rule);
  }
  .output-empty p {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--muted);
    max-width: 260px;
  }

  /* PRD OUTPUT */
  #prd-output { display: none; }

  .prd-header {
    border-bottom: 1.5px solid var(--ink);
    padding-bottom: 1.5rem;
    margin-bottom: 2rem;
  }
  .prd-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-bottom: 0.6rem;
    display: flex;
    gap: 1.5rem;
  }
  .prd-title {
    font-family: var(--serif);
    font-size: 2.2rem;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }
  .status-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 2px;
    background: var(--accent-light);
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  .prd-section { margin-bottom: 2rem; }
  .prd-section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    border-bottom: 1px solid var(--rule);
    padding-bottom: 0.4rem;
    margin-bottom: 0.85rem;
  }
  .prd-section p {
    font-size: 14px;
    line-height: 1.75;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }
  .prd-section ul, .prd-section ol {
    padding-left: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .prd-section li { font-size: 14px; line-height: 1.65; }

  /* Story cards */
  .story-card {
    background: var(--paper);
    border: 1.5px solid var(--rule);
    border-radius: 4px;
    padding: 1rem 1.25rem;
    margin-bottom: 0.75rem;
  }
  .story-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }
  .story-text { font-size: 14px; line-height: 1.65; }
  .story-ac {
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--rule);
  }
  .story-ac-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }
  .story-ac ul { padding-left: 1.1rem; }
  .story-ac li { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* Risk table */
  .risk-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .risk-table th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-align: left;
    padding: 0.5rem 0.75rem;
    border-bottom: 1.5px solid var(--rule);
  }
  .risk-table td {
    padding: 0.65rem 0.75rem;
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
    line-height: 1.55;
  }
  .risk-table tr:last-child td { border-bottom: none; }
  .risk-hi { color: var(--accent); font-weight: 600; }
  .risk-med { color: #a07030; font-weight: 600; }
  .risk-lo { color: #3a7a4a; font-weight: 600; }

  .btn-copy {
    background: transparent;
    border: 1.5px solid var(--rule);
    border-radius: 4px;
    padding: 0.55rem 1.1rem;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    cursor: pointer;
    color: var(--muted);
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-copy:hover { border-color: var(--ink); color: var(--ink); }

  .prd-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1.5px solid var(--rule);
  }

  /* Streaming cursor */
  .cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent); vertical-align: text-bottom; animation: blink 0.8s step-end infinite; margin-left: 2px; }
  @keyframes blink { 50%{opacity:0;} }

  @media (max-width: 800px) {
    main { grid-template-columns: 1fr; }
    .panel-input { border-right: none; border-bottom: 1.5px solid var(--ink); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">PRD<span>.</span>gen</div>
  <div class="tagline">AI-powered product requirements // portfolio project</div>
</header>

<main>
  <!-- INPUT PANEL -->
  <aside class="panel-input">
    <div class="field-group">
      <div class="panel-label">Feature name</div>
      <input type="text" id="feature-name" placeholder="e.g. Dark mode toggle" />
    </div>

    <div class="field-group">
      <div class="panel-label">Product / platform</div>
      <input type="text" id="product-name" placeholder="e.g. Masisi Radio web app" />
    </div>

    <div class="field-group">
      <div class="panel-label">Target users</div>
      <input type="text" id="target-users" placeholder="e.g. Casual listeners, mobile-first" />
    </div>

    <div class="field-group">
      <div class="panel-label">Problem being solved</div>
      <textarea id="problem" placeholder="Briefly describe the core user problem this feature addresses..."></textarea>
    </div>

    <div class="field-group">
      <div class="panel-label">Priority level</div>
      <select id="priority">
        <option value="P0 — Critical">P0 — Critical</option>
        <option value="P1 — High" selected>P1 — High</option>
        <option value="P2 — Medium">P2 — Medium</option>
        <option value="P3 — Low">P3 — Low</option>
      </select>
    </div>

    <div class="field-group">
      <div class="panel-label">Additional context (optional)</div>
      <textarea id="context" placeholder="Constraints, technical notes, edge cases to consider..." style="min-height:65px;"></textarea>
    </div>

    <button class="btn-generate" id="generate-btn" onclick="generatePRD()">
      <span id="btn-text">Generate PRD →</span>
      <div class="dot-loader" id="loader"><span></span><span></span><span></span></div>
    </button>
  </aside>

  <!-- OUTPUT PANEL -->
  <section class="panel-output">
    <div class="output-empty" id="empty-state">
      <div class="big-char">§</div>
      <p>Fill in the fields and generate a full product requirements doc.</p>
    </div>

    <div id="prd-output">
      <div class="prd-header">
        <div class="prd-meta">
          <span id="out-product"></span>
          <span id="out-date"></span>
          <span id="out-priority"></span>
        </div>
        <h1 class="prd-title" id="out-title"></h1>
        <span class="status-badge">DRAFT</span>
      </div>

      <div id="prd-body"></div>

      <div class="prd-actions">
        <button class="btn-copy" onclick="copyPRD()">Copy as text</button>
        <button class="btn-copy" onclick="resetForm()">New PRD</button>
      </div>
    </div>
  </section>
</main>

<script>
async function generatePRD() {
  const feature = document.getElementById('feature-name').value.trim();
  const product = document.getElementById('product-name').value.trim();
  const users = document.getElementById('target-users').value.trim();
  const problem = document.getElementById('problem').value.trim();
  const priority = document.getElementById('priority').value;
  const context = document.getElementById('context').value.trim();

  if (!feature || !product || !problem) {
    alert('Please fill in feature name, product, and problem statement.');
    return;
  }

  const btn = document.getElementById('generate-btn');
  const loader = document.getElementById('loader');
  const btnText = document.getElementById('btn-text');
  btn.disabled = true;
  btnText.style.display = 'none';
  loader.style.display = 'flex';

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('prd-output').style.display = 'none';

  const prompt = `You are a senior product manager writing a Product Requirements Document.

Feature: ${feature}
Product / Platform: ${product}
Target Users: ${users || 'General users'}
Priority: ${priority}
Problem Statement: ${problem}
${context ? 'Additional Context: ' + context : ''}

Write a complete PRD in JSON format. Return ONLY valid JSON, no markdown backticks, no preamble.

JSON structure:
{
  "overview": "2-3 sentence executive summary of the feature and its strategic value",
  "problem": "Clear articulation of the user problem and why it matters now",
  "goals": ["goal 1", "goal 2", "goal 3"],
  "non_goals": ["what this feature explicitly will NOT do — 2-3 items"],
  "user_stories": [
    {
      "id": "US-01",
      "story": "As a [user type], I want to [action] so that [benefit].",
      "acceptance_criteria": ["AC 1", "AC 2", "AC 3"]
    },
    {
      "id": "US-02",
      "story": "As a [user type], I want to [action] so that [benefit].",
      "acceptance_criteria": ["AC 1", "AC 2", "AC 3"]
    },
    {
      "id": "US-03",
      "story": "As a [user type], I want to [action] so that [benefit].",
      "acceptance_criteria": ["AC 1", "AC 2"]
    }
  ],
  "success_metrics": [
    {"metric": "Metric name", "target": "Specific measurable target", "measurement": "How to measure it"}
  ],
  "risks": [
    {"risk": "Risk description", "severity": "High", "mitigation": "Mitigation strategy"},
    {"risk": "Risk description", "severity": "Medium", "mitigation": "Mitigation strategy"},
    {"risk": "Risk description", "severity": "Low", "mitigation": "Mitigation strategy"}
  ],
  "open_questions": ["Question 1?", "Question 2?", "Question 3?"]
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const raw = data.content.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const prd = JSON.parse(clean);
    renderPRD(prd, feature, product, priority);
  } catch (err) {
    alert('Something went wrong generating the PRD. Please try again.');
    console.error(err);
  } finally {
    btn.disabled = false;
    btnText.style.display = 'inline';
    loader.style.display = 'none';
  }
}

function renderPRD(prd, feature, product, priority) {
  document.getElementById('out-title').textContent = feature;
  document.getElementById('out-product').textContent = product;
  document.getElementById('out-date').textContent = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('out-priority').textContent = priority;

  let html = '';

  // Overview
  html += section('Overview', `<p>${prd.overview}</p>`);

  // Problem
  html += section('Problem statement', `<p>${prd.problem}</p>`);

  // Goals & non-goals
  const goalsHtml = `<ul>${prd.goals.map(g => `<li>${g}</li>`).join('')}</ul>`;
  const nonGoalsHtml = `<p style="font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.06em;margin:0.75rem 0 0.35rem;">OUT OF SCOPE</p><ul>${prd.non_goals.map(g => `<li style="color:var(--muted)">${g}</li>`).join('')}</ul>`;
  html += section('Goals', goalsHtml + nonGoalsHtml);

  // User stories
  const storiesHtml = prd.user_stories.map(s => `
    <div class="story-card">
      <div class="story-id">${s.id}</div>
      <div class="story-text">${s.story}</div>
      <div class="story-ac">
        <div class="story-ac-label">Acceptance criteria</div>
        <ul>${s.acceptance_criteria.map(ac => `<li>${ac}</li>`).join('')}</ul>
      </div>
    </div>
  `).join('');
  html += section('User stories', storiesHtml);

  // Success metrics
  const metricsHtml = prd.success_metrics.map(m => `
    <div style="background:var(--paper);border:1.5px solid var(--rule);border-radius:4px;padding:0.85rem 1.1rem;margin-bottom:0.6rem;">
      <div style="font-weight:600;font-size:14px;margin-bottom:0.25rem;">${m.metric}</div>
      <div style="font-family:var(--mono);font-size:12px;color:var(--accent);margin-bottom:0.2rem;">Target: ${m.target}</div>
      <div style="font-size:13px;color:var(--muted);">${m.measurement}</div>
    </div>
  `).join('');
  html += section('Success metrics', metricsHtml);

  // Risks
  const riskHtml = `
    <table class="risk-table">
      <thead><tr><th>Risk</th><th>Severity</th><th>Mitigation</th></tr></thead>
      <tbody>
        ${prd.risks.map(r => `
          <tr>
            <td>${r.risk}</td>
            <td><span class="${r.severity === 'High' ? 'risk-hi' : r.severity === 'Medium' ? 'risk-med' : 'risk-lo'}">${r.severity}</span></td>
            <td>${r.mitigation}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
  html += section('Risks', riskHtml);

  // Open questions
  const oqHtml = `<ol>${prd.open_questions.map(q => `<li>${q}</li>`).join('')}</ol>`;
  html += section('Open questions', oqHtml);

  document.getElementById('prd-body').innerHTML = html;
  document.getElementById('prd-output').style.display = 'block';
  document.querySelector('.panel-output').scrollTop = 0;
}

function section(label, content) {
  return `<div class="prd-section">
    <div class="prd-section-label">${label}</div>
    ${content}
  </div>`;
}

function copyPRD() {
  const title = document.getElementById('out-title').textContent;
  const body = document.getElementById('prd-body').innerText;
  navigator.clipboard.writeText(`PRD: ${title}\n\n${body}`).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy as text', 2000);
  });
}

function resetForm() {
  document.getElementById('prd-output').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
}

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') generatePRD();
});
</script>
</body>
</html>
